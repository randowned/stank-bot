name: Deploy

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/stankbot/web/frontend/package-lock.json

      - name: Install Python dev deps
        run: pip install -e ".[dev]"

      - name: Install frontend deps
        working-directory: src/stankbot/web/frontend
        run: npm ci

      # --- Lint ---
      - name: Ruff
        run: ruff check src tests

      - name: Mypy (advisory — non-blocking)
        run: mypy src --ignore-missing-imports
        continue-on-error: true

      - name: Frontend lint
        working-directory: src/stankbot/web/frontend
        run: npm run lint

      # --- Build ---
      - name: Build frontend
        working-directory: src/stankbot/web/frontend
        run: npm run build

      # --- Unit tests ---
      - name: Unit tests (Python)
        run: pytest tests/unit/ -x --tb=short
        env:
          CHART_CACHE_DIR: /tmp/chart-cache

      - name: Unit tests (Frontend)
        working-directory: src/stankbot/web/frontend
        run: npx svelte-kit sync && npx vitest run

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get last release tag
        id: last_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            # No tags yet — use the first commit as the baseline
            TAG=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "is_initial=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "is_initial=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read current version from pyproject.toml
        id: current_version
        run: |
          VERSION=$(python3 -c "
          import re, pathlib
          content = pathlib.Path('pyproject.toml').read_text()
          match = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE)
          print(match.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        run: |
          python3 - <<'PYEOF'
          import os, re, pathlib

          version = "${{ steps.current_version.outputs.version }}"
          bump_type = "${{ inputs.bump }}"

          parts = version.split(".")
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])

          if bump_type == "major":
              major += 1; minor = 0; patch = 0
          elif bump_type == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          print(f"Bumping {version} -> {new_version} ({bump_type})")

          # Update pyproject.toml
          content = pathlib.Path("pyproject.toml").read_text()
          new_content = re.sub(
              r'^(version\s*=\s*)"[^"]+"',
              f'\\1"{new_version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          pathlib.Path("pyproject.toml").write_text(new_content)

          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new_version}\n")
              f.write(f"tag=v{new_version}\n")
          PYEOF

      - name: Generate change summary
        id: summary
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          CHANGES=$(git log --oneline "${LAST_TAG}..HEAD" --no-merges | head -20)
          if [ -z "$CHANGES" ]; then
            CHANGES="No changes since ${LAST_TAG}"
          fi
          # Use delimiter for multiline output
          {
            echo "changes<<DELIMITER"
            echo "$CHANGES"
            echo "DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          SUMMARY=$(echo "${{ steps.summary.outputs.changes }}" | head -5 | tr '\n' '; ' | sed 's/; $//')
          git add pyproject.toml
          git commit -m "${TAG} - deploy: ${SUMMARY}"

      - name: Push version bump to main
        run: |
          git push origin HEAD:main

      - name: Sync release branch
        run: |
          git push origin HEAD:release --force

      - name: Create and push tag
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          gh release create "$TAG" \
            --generate-notes \
            --title "$TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
