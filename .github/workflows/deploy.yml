name: Deploy

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # No CI gate here: every change reaches main only via a PR, which ci.yml
  # already gates (lint + build + unit tests), and main is branch-protected.
  # Re-running CI at deploy time would just duplicate that.
  prepare:
    name: Prepare Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get last release tag
        id: last_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            # No tags yet — find the last versioned commit (vX.Y.Z)
            TAG=$(git log --oneline --grep="^v[0-9]" -1 --format="%H" 2>/dev/null || echo "")
            if [ -z "$TAG" ]; then
              TAG=$(git rev-list --max-parents=0 HEAD | head -1)
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Read current version from pyproject.toml
        id: current_version
        run: |
          VERSION=$(python3 -c "
          import re, pathlib
          content = pathlib.Path('pyproject.toml').read_text()
          match = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE)
          print(match.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        run: |
          python3 - <<'PYEOF'
          import os, re, pathlib

          version = "${{ steps.current_version.outputs.version }}"
          bump_type = "${{ inputs.bump }}"

          parts = version.split(".")
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])

          if bump_type == "major":
              major += 1; minor = 0; patch = 0
          elif bump_type == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          print(f"Bumping {version} -> {new_version} ({bump_type})")

          # Update pyproject.toml
          content = pathlib.Path("pyproject.toml").read_text()
          new_content = re.sub(
              r'^(version\s*=\s*)"[^"]+"',
              f'\\1"{new_version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          pathlib.Path("pyproject.toml").write_text(new_content)

          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new_version}\n")
              f.write(f"tag=v{new_version}\n")
          PYEOF

      - name: Generate change summary
        id: summary
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          CHANGES=$(git log --oneline "${LAST_TAG}..HEAD" --no-merges | head -20)
          if [ -z "$CHANGES" ]; then
            CHANGES="No changes since ${LAST_TAG}"
          fi
          # Use delimiter for multiline output
          {
            echo "changes<<DELIMITER"
            echo "$CHANGES"
            echo "DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          CHANGES="${{ steps.summary.outputs.changes }}"

          # Create branch from main
          BRANCH="deploy/v${NEW_VERSION}"
          git checkout -b "$BRANCH"

          # Write commit message to file (avoids multiline shell issues)
          {
            echo "$TAG"
            echo ""
            echo "Changelog:"
            echo "$CHANGES"
          } > /tmp/commit_msg.txt

          # Commit version bump
          git add pyproject.toml
          git commit -F /tmp/commit_msg.txt

          # Push branch
          git push origin "$BRANCH"

          # Create PR body
          {
            echo "## Changelog"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "---"
            echo "Merging this PR triggers the release pipeline: sync to release branch → Railway deploy → git tag → GitHub Release."
          } > /tmp/pr_body.txt

          # Create PR
          gh pr create \
            --title "$TAG" \
            --body-file /tmp/pr_body.txt \
            --base main \
            --head "$BRANCH"
