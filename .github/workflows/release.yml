name: Release

on:
  push:
    branches: [main]

jobs:
  check-release:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if latest commit is a version bump
        id: check
        run: |
          MSG=$(git log -1 --format="%s")
          # Match: vX.Y.Z or vX.Y.Z - anything
          if [[ "$MSG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION=$(echo "$MSG" | grep -oP '^v\K[0-9]+\.[0-9]+\.[0-9]+')
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "Detected release: v$VERSION"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a release commit"
          fi

  deploy:
    name: Deploy
    needs: check-release
    if: needs.check-release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main to release branch
        run: |
          git push origin HEAD:release --force

      - name: Get previous release tag (before creating new one)
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -1)
          echo "tag=${PREV_TAG:-}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ needs.check-release.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-release.outputs.tag }}
          PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: |
          # Generate changelog from previous tag to HEAD
          # exclude the version bump commit (it's always at HEAD)
          NOTES="$(git log --format='* %s by @%an' "${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}..HEAD~1")"
          # Append Full Changelog comparison link
          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}"$'\n'$'\n'"**Full Changelog:** ${PREV_TAG}...${TAG}"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES"
