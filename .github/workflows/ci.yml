name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/stankbot/web/frontend/package-lock.json

      - name: Install Python dev deps
        run: pip install -e ".[dev]"

      - name: Install frontend deps
        working-directory: src/stankbot/web/frontend
        run: npm ci

      - name: Ruff
        run: ruff check src tests

      - name: Mypy (advisory — non-blocking)
        run: mypy src --ignore-missing-imports
        continue-on-error: true

      - name: Frontend lint
        working-directory: src/stankbot/web/frontend
        run: npm run lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/stankbot/web/frontend/package-lock.json

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Install frontend deps
        working-directory: src/stankbot/web/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/stankbot/web/frontend
        run: npm run build

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/stankbot/web/frontend/package-lock.json

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Install frontend deps
        working-directory: src/stankbot/web/frontend
        run: npm ci

      - name: Unit tests (Python)
        run: pytest tests/unit/ -x --tb=short
        env:
          CHART_CACHE_DIR: /tmp/chart-cache

      - name: Unit tests (Frontend)
        working-directory: src/stankbot/web/frontend
        run: npx svelte-kit sync && npx vitest run

