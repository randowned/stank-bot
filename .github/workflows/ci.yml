name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src --ignore-missing-imports

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/stankbot/web/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: src/stankbot/web/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: src/stankbot/web/frontend
        run: npm run lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e .

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/stankbot/web/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: src/stankbot/web/frontend
        run: npm ci

      - name: Frontend build
        working-directory: src/stankbot/web/frontend
        run: npm run build

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest tests/unit/ -x --tb=short

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/stankbot/web/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: src/stankbot/web/frontend
        run: npm ci

      - name: Frontend unit tests
        working-directory: src/stankbot/web/frontend
        run: npx vitest run

  e2e:
    name: E2E
    needs: test
    runs-on: ubuntu-latest
    env:
      ENV: dev-mock
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/stankbot/web/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: src/stankbot/web/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/stankbot/web/frontend
        run: npx playwright install chromium --with-deps

      - name: Create data directory
        run: mkdir -p data

      - name: Run E2E tests
        run: node scripts/run-e2e.mjs

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/stankbot/web/frontend/playwright-report/
          retention-days: 7
