name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install uv && uv sync
      - run: uv run ruff check src tests
      - run: uv run mypy src

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: src/stankbot/web/frontend/package-lock.json }
      - run: npm ci
        working-directory: src/stankbot/web/frontend
      - run: npm run check
        working-directory: src/stankbot/web/frontend

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install uv && uv sync
      - run: uv run pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: src/stankbot/web/frontend/package-lock.json }
      - run: pip install uv && uv sync
      - run: npm ci
        working-directory: src/stankbot/web/frontend
      - run: npx playwright install chromium --with-deps
        working-directory: src/stankbot/web/frontend
      - run: node scripts/run-e2e.mjs
        env: { CI: 'true' }
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: src/stankbot/web/frontend/playwright-report/
