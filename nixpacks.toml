# Nixpacks configuration for Railway deployment.
#
# stank-bot uses Nixpacks (Railway's default build system). This config
# adds system-level dependencies needed by optional features.
#
# ffmpeg: required for voice message stank detection (Opus → PCM decoding
# via faster-whisper). Only needed when voice_keywords are configured on
# an altar. Bot functions normally without it.

[phases.setup]
nixPkgs = ["ffmpeg"]
