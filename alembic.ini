# Alembic configuration for StankBot.
#
# The async engine + dynamic URL from the application's config are wired in
# `migrations/env.py`; this file holds the static layout.

[alembic]
script_location = migrations
prepend_sys_path = src
version_path_separator = os
# sqlalchemy.url is intentionally blank — env.py reads DATABASE_URL from the app config.
sqlalchemy.url =

# Use a timestamp + slug for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
