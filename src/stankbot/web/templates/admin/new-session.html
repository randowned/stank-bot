{% extends "base.html" %}
{% block title %}New Session — StankBot{% endblock %}
{% block content %}
<h2>New Session — {{ guild_name }}</h2>
<div class="panel">
  <p>End the current session and start a new one. The live chain persists.</p>
  {% if done %}
  <p class="saved-indicator">Session rolled.</p>
  {% endif %}
  <form method="post">
    <button type="submit">Start new session</button>
  </form>
</div>
{% endblock %}
