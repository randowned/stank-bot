{% extends "base.html" %}
{% block title %}Maintenance — StankBot{% endblock %}
{% block content %}
<h2>Maintenance Mode</h2>
<div class="panel">
  <p>When enabled, non-admin commands are silenced and the bot only responds to admins.</p>
  <form method="post">
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <input type="checkbox" name="enabled" value="true" style="width:auto;"
             {% if maintenance_enabled %}checked{% endif %}>
      Enable maintenance mode
    </label>
    <div class="save-row">
      <button type="submit">Save</button>
      {% if saved %}<span class="saved-indicator">Saved</span>{% endif %}
    </div>
  </form>
</div>
{% endblock %}
