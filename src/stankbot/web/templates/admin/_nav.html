{% set _path = request.url.path %}
<nav class="admin-nav">
  {% for href, label in [
    ('/admin/settings', 'Settings'),
    ('/admin/altar', 'Altar'),
    ('/admin/roles', 'Admins'),
    ('/admin/audit', 'Audit log'),
  ] %}
    <a href="{{ href }}"{% if _path == href %} class="active"{% endif %}>{{ label }}</a>
  {% endfor %}
</nav>
