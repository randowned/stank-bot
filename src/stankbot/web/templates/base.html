<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StankBot{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --border: #262a33;
      --text: #e5e7eb;
      --muted: #9aa4b2;
      --accent: #a47cff;
      --gold: #ffd166;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    header a { color: var(--text); text-decoration: none; font-weight: 600; }
    nav a { color: var(--muted); margin-left: 16px; text-decoration: none; }
    nav a:hover { color: var(--text); }
    main { max-width: 960px; margin: 32px auto; padding: 0 24px; }
    h1, h2, h3 { color: var(--text); margin-top: 0; }
    a { color: var(--accent); }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; margin-bottom: 16px;
    }
    .muted { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.85em; text-transform: uppercase; }
    input, select, textarea, button {
      font: inherit; color: var(--text); background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
    }
    textarea { width: 100%; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
    button {
      background: var(--accent); color: #1a1425; border: none;
      font-weight: 600; cursor: pointer; padding: 8px 16px;
    }
    button.secondary { background: var(--border); color: var(--text); }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.9em; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
    .badge { display: inline-block; background: var(--border); padding: 4px 8px;
             border-radius: 4px; margin-right: 6px; font-size: 0.9em; }
    .embed-preview {
      border-left: 4px solid var(--accent); background: #1f232b;
      padding: 12px 16px; border-radius: 4px; margin-top: 12px;
    }
    .embed-preview .title { font-weight: 700; margin-bottom: 4px; }
    .embed-preview .footer { color: var(--muted); font-size: 0.85em; margin-top: 10px; }
    .embed-preview .field { margin-top: 8px; }
    .embed-preview .field .name { font-weight: 600; font-size: 0.9em; }
    .embed-preview .field .value { white-space: pre-wrap; }
    .stank-icon { height: 1.1em; width: auto; vertical-align: -0.15em; }
    h1 .stank-icon, h2 .stank-icon { height: 1em; }
    .admin-nav {
      display: flex; gap: 4px; flex-wrap: wrap;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px; margin-bottom: 16px;
    }
    .admin-nav a {
      color: var(--muted); text-decoration: none;
      padding: 6px 12px; border-radius: 6px; font-size: 0.95em;
    }
    .admin-nav a:hover { color: var(--text); background: var(--border); }
    .admin-nav a.active { color: #1a1425; background: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <a href="/"><img src="/static/Stank.gif" alt="Stank" class="stank-icon"> StankBot</a>
    <nav>
      {% if user %}
        <span class="muted">{{ user.username }}</span>
        <a href="/auth/logout">Logout</a>
      {% else %}
        <a href="/auth/login">Login with Discord</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
